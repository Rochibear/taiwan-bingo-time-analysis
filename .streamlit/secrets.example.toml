# Copy these values into Streamlit Community Cloud > App > Settings > Secrets.
# Do not commit a real .streamlit/secrets.toml file.

AUTH_ENABLED = true
AUTH_ADMIN_EMAILS = ["your-email@example.com"]
AUTH_ALLOWED_EMAILS = []
ADMIN_PIN = "change-this-admin-pin"
AUTH_OTP_MINUTES = 10
AUTH_SESSION_HOURS = 24
AUTH_RESEND_COOLDOWN_SECONDS = 60
AUTH_DEBUG_OTP = false
AUTH_OTP_SECRET = "change-this-long-random-secret"

# Gmail example: use an App Password, not your normal Gmail password.
SMTP_HOST = "smtp.gmail.com"
SMTP_PORT = 465
SMTP_USERNAME = "your-email@gmail.com"
SMTP_PASSWORD = "your-gmail-app-password"
SMTP_FROM = "your-email@gmail.com"
SMTP_SSL = true
SMTP_STARTTLS = false
